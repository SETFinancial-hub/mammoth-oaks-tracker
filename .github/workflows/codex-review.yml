name: Codex Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]
    paths-ignore:
      - 'AGENTS.md'
      - '*.md'
      - '.github/workflows/codex-review.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-review:
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pre-fetch refs (PR only)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            ${{ github.event.pull_request.head.sha }}

      - name: Run Codex Review (PR)
        if: github.event_name == 'pull_request'
        id: run_codex_pr
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            This is PR #${{ github.event.pull_request.number }} for ${{ github.repository }}.
            Review ONLY the changes introduced by the PR by considering:
            git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}

            Focus on:
            - Bugs and logic errors
            - Security vulnerabilities
            - Performance issues
            - Code quality and maintainability
            - Missing error handling

            Be concise and specific. Only flag P0 and P1 issues.

      - name: Run Codex Review (Push)
        if: github.event_name == 'push'
        id: run_codex_push
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Review the latest push to ${{ github.repository }} (${{ github.ref_name }}).
            The commit is: ${{ github.event.head_commit.message }}
            Review ONLY the changes in this push by considering:
            git diff ${{ github.event.before }}...${{ github.sha }}

            Focus on:
            - Bugs and logic errors
            - Security vulnerabilities
            - Performance issues
            - Code quality and maintainability
            - Missing error handling

            Be concise and specific. Only flag P0 and P1 issues.
            If everything looks good, just say "No issues found."

      - name: Set output
        id: run_codex
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "final-message=${{ steps.run_codex_pr.outputs.final-message }}" >> "$GITHUB_OUTPUT"
          else
            echo "final-message=${{ steps.run_codex_push.outputs.final-message }}" >> "$GITHUB_OUTPUT"
          fi

  post-pr-feedback:
    runs-on: ubuntu-latest
    needs: codex-review
    if: github.event_name == 'pull_request' && needs.codex-review.outputs.final_message != ''
    permissions:
      pull-requests: write
    steps:
      - name: Post Codex feedback on PR
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });

  post-push-feedback:
    runs-on: ubuntu-latest
    needs: codex-review
    if: github.event_name == 'push' && needs.codex-review.outputs.final_message != ''
    permissions:
      contents: write
    steps:
      - name: Post Codex feedback on commit
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🔍 **Codex Code Review**\n\n${process.env.CODEX_FINAL_MESSAGE}`,
            });
